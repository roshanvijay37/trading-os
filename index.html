<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="TradingOS — a discipline-first risk manager and trading journal."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>"
    />
    <title>TradingOS</title>
    <script>
      // Apply the saved theme before first paint (avoids a dark->light or light->dark flash).
      // Kept in sync with the storage key/fallback in src/store/theme.ts.
      (function () {
        try {
          var t = localStorage.getItem("trading-os-theme");
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <script>
      // Redirect direct paths to hash-based routing for SPA.
      // Base-aware: %BASE_URL% is replaced by Vite at build time ('/' in production,
      // '/dev/' for subpath dev deploys) so the shim never bounces a subpath deploy
      // back to the site root.
      (function() {
        var base = '%BASE_URL%';
        var path = window.location.pathname;
        var hash = window.location.hash;
        var search = window.location.search;

        // If we have an auth_code in the URL but no hash, redirect to hash
        if (search.includes('auth_code=') && !hash) {
          window.location.replace(base + '#' + search);
          return;
        }

        // Handle direct paths like /live-trade (relative to the deploy base)
        var rel = path.indexOf(base) === 0 ? path.slice(base.length - 1) : path;
        if (rel !== '/' && rel !== '' && !hash) {
          window.location.replace(base + '#' + rel + search);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
