name: Build dev preview

# Builds the dev branch (typecheck + frontend tests + /dev/-based bundle) and
# force-pushes the static output to the `dev-dist` branch. The Lightsail box
# (416MB RAM — too small to run tsc/vite) serves that branch at
# https://api.roshanvijay.com/dev/ via an nginx alias; deploying dev is just
# `git pull` in /var/www/trading-os-dev.

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "dev-preview"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (root + server — vitest runs the server tests too)
        run: |
          npm install
          cd server && npm install

      - name: Typecheck + production build (gate)
        run: npm run build

      - name: Full test suite
        run: npm test

      - name: Build /dev/-based bundle
        run: npx vite build --base=/dev/ --outDir dist-dev

      - name: Publish to dev-dist branch
        run: |
          cd dist-dev
          cp index.html 404.html
          git init -b dev-dist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "dev preview build ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" dev-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
