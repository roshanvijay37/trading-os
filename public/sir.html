function buildDiff(today,prev){
  const k=today.key, M=today.metrics;
  const pMap=prev?new Map(prev.rows.map(r=>[keyOf(r,k),r])):new Map();
  const changed=[];
  if(prev){
    for(const r of today.rows){
      const pr=pMap.get(keyOf(r,k));
      if(!pr) continue;
      const diffs=[];
      for(const m of M){ const a=r[m]??0,b=pr[m]??0; if(a!==b) diffs.push({field:m,from:b,to:a,delta:(typeof a==='number'&&typeof b==='number')?a-b:null}); }
      if(diffs.length) changed.push({row:r,prev:pr,diffs,dmap:Object.fromEntries(diffs.map(d=>[d.field,d]))});
    }
  }
  const totals={}; for(const m of M) totals[m]={now:sum(today.rows,m),delta:prev?sum(today.rows,m)-sum(prev.rows,m):null};
  return {changed,totals};
}

  return STATE.metrics.map(m=>{
    const d=dmap&&dmap[m];
    if(d){ const dl=d.delta!=null?'<span class="fd '+(d.delta>0?'up':'down')+'">'+(d.delta>0?'+':'')+fmt(d.delta)+'</span>':''; return '<div class="frow changed"><div class="fl">'+esc(sh(m))+'</div><div class="fromto">'+fmt(d.from)+' в†’ '+fmt(d.to)+'</div>'+dl+'</div>'; }
    return '<div class="frow"><div class="fl">'+esc(sh(m))+'</div><div class="fv">'+fmt(r[m]??0)+'</div></div>';
  }).join('');
}
function partCard(r,opts){
  opts=opts||{}; const dmap=opts.dmap;
  const pn=r["Part Number"], asm=r["Asmbly Name"]||'', ac=r["AC Number"];
  let flag='';
  if(dmap){ const n=Object.keys(dmap).length; flag='<span class="flag ch">в–І '+n+' changed</span>'; }
  return '<div class="pcard '+(dmap?'ch':'')+'">'+
    '<div class="ph"><div class="pn"><span class="hash">Part </span>'+esc(String(pn))+'</div><div class="pmeta">'+(ac!=null?'AC '+esc(String(ac))+(asm?' В· ':''):'')+esc(asm)+'</div>'+flag+'</div>'+
    '<div class="grid">'+headlineCells(r,dmap)+'</div>'+
    '<div class="ircon pconn">'+partContacts(pn)+'</div>'+
    '<details class="more"><summary><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>'+(dmap?'All fields & changes':'All '+STATE.metrics.length+' fields')+'</summary><div class="full">'+fullRows(r,dmap)+'</div></details>'+
    '</div>';
}

function currentList(){
  const df=STATE.diff, q=STATE.q.trim().toLowerCase();
  const cm=new Map(df.changed.map(c=>[keyOf(c.row,STATE.key),c.dmap]));
  let items=STATE.today.rows.map(r=>({r,dmap:cm.get(keyOf(r,STATE.key))}));
  if(q){ items=items.filter(it=>{ const r=it.r; if(String(r["Part Number"]).includes(q)) return true; return STATE.metrics.some(m=>String(r[m]).includes(q)) || String(r["Asmbly Name"]||'').toLowerCase().includes(q); }); }
  return items;
}
function render(){
  if(STATE.tab==='insights'){ el.count.innerHTML=''; renderInsights(); return; }
  if(STATE.tab==='kendra'){ el.count.innerHTML=''; renderKendra(); return; }
  const items=currentList();
  el.count.innerHTML='<b>'+items.length+'</b> '+(items.length===1?'part':'parts');
  if(!items.length){ el.list.innerHTML='<div class="empty"><div class="ico">рџ”Ќ</div><h3>Nothing here</h3><p>No part matches your search.</p></div>'; return; }
  el.list.innerHTML='<div class="cards">'+items.map(it=>partCard(it.r,it)).join('')+'</div>';
}

function setTab(t){ STATE.tab=t; [...el.tabs.children].forEach(b=>b.setAttribute('aria-pressed',b.dataset.tab===t)); render(); }

async function getJSON(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(u+' '+r.status); return r.json(); }

async function getSnap(d){ if(!STATE.snaps[d]) STATE.snaps[d]=await getJSON(BASE+d+'.json'); return STATE.snaps[d]; }
const latestDate=()=>STATE.dates[STATE.dates.length-1];
const prevDate=()=>STATE.dates.length>1?STATE.dates[STATE.dates.length-2]:latestDate();

function optionsHTML(sel){
  const L=latestDate();
  return STATE.dates.slice().reverse().map(d=>'<option value="'+d+'"'+(d===sel?' selected':'')+'>'+esc(d)+(d===L?' (latest)':'')+'</option>').join('');
}
function buildControls(){
  const multi=STATE.dates.length>1;
  const q = multi ? '<div class="qbtns">'
      +'<button class="qbtn" type="button" data-q="yesterday">Yesterday</button>'
      +'<button class="qbtn" type="button" data-q="today">Today</button>'
      +'<button class="qbtn" type="button" data-q="diff">Yesterday в†’ Today</button></div>' : '';
  el.ctrl.innerHTML=q+'<div class="range"><select id="fromSel" aria-label="From date"></select><span class="arrow">в†’</span><select id="toSel" aria-label="To date"></select></div>';
  el.fromSel=document.getElementById('fromSel'); el.toSel=document.getElementById('toSel');
  el.fromSel.innerHTML=optionsHTML(STATE.from); el.toSel.innerHTML=optionsHTML(STATE.to);
  el.fromSel.onchange=()=>{STATE.from=el.fromSel.value; loadView();};
  el.toSel.onchange=()=>{STATE.to=el.toSel.value; loadView();};
  el.ctrl.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{
    const L=latestDate(), P=prevDate();
    if(b.dataset.q==='today'){STATE.from=L; STATE.to=L;}
    else if(b.dataset.q==='yesterday'){STATE.from=P; STATE.to=P;}
    else {STATE.from=P; STATE.to=L;}
    loadView();
  });
}
function refreshControls(){
  if(el.fromSel) el.fromSel.value=STATE.from;
  if(el.toSel) el.toSel.value=STATE.to;
  const L=latestDate(), P=prevDate();
  const active=(STATE.from===L&&STATE.to===L)?'today':(STATE.from===P&&STATE.to===P)?'yesterday':(STATE.from===P&&STATE.to===L)?'diff':'';
  el.ctrl.querySelectorAll('[data-q]').forEach(b=>b.setAttribute('aria-pressed', b.dataset.q===active));
}

async function loadView(){
  try{
    el.list.innerHTML='<div class="loading"><div class="spin"></div>LoadingвЂ¦</div>';
    if(STATE.from>STATE.to){const t=STATE.from;STATE.from=STATE.to;STATE.to=t;}
    const single=STATE.from===STATE.to;
    const to=await getSnap(STATE.to);
    const from=single?null:await getSnap(STATE.from);
    STATE.today=to; STATE.prev=from; STATE.key=to.key; STATE.metrics=to.metrics; STATE.q=el.search.value||'';
    STATE.headline=HEADLINE.filter(m=>to.metrics.includes(m)); if(!STATE.headline.length) STATE.headline=to.metrics.slice(0,4);
    STATE.summary=SUMMARY.filter(m=>to.metrics.includes(m)); if(!STATE.summary.length) STATE.summary=to.metrics.slice(0,5);
    STATE.diff=buildDiff(to,from);
    el.hdate.innerHTML='<div class="d">'+esc(STATE.to)+'</div><div class="v">'+(single?'single day':'vs '+esc(STATE.from))+'</div>';
    el.note.innerHTML=single
      ? '<div class="note">Showing <b>'+esc(STATE.to)+'</b> вЂ” snapshot totals'+(STATE.dates.length>1?'. Pick a different вЂњFromвЂќ day to see the difference.':' (first snapshot; the diff appears once a second day exists).')+'</div>'
      : '';
    refreshControls(); renderStats(); renderTabs(); setTab('kendra');
  }catch(e){
    el.list.innerHTML='<div class="empty"><div class="ico">вљ пёЏ</div><h3>Could not load data</h3><p>'+esc(e.message)+'</p></div>'; el.stats.innerHTML='';
  }
}

async function boot(){
  try{
    const idx=await getJSON(BASE+'index.json?t='+Date.now());
    STATE.dates=(idx.dates||[]).slice().sort();
    if(!STATE.dates.length) throw new Error('no snapshots');
    STATE.from=prevDate(); STATE.to=latestDate();   // default: yesterday в†’ today (or single day if only one)
    buildControls();
    await loadView();
    loadBLA2().then(()=>{ if(STATE.today) render(); });   // enrich contacts once maha.html resolves; never blocks initial paint
  }catch(e){
    el.list.innerHTML='<div class="empty"><div class="ico">вљ пёЏ</div><h3>Could not load data</h3><p>'+esc(e.message)+'</p></div>'; el.stats.innerHTML='';
  }
}

el.tabs.addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(b)setTab(b.dataset.tab);});
el.list.addEventListener('click',e=>{
  const mb=e.target.closest('[data-more]');
  if(mb){
    const box=mb.parentElement.querySelector('.imore');
    if(box){
      const open=box.hasAttribute('hidden');
      if(open){box.removeAttribute('hidden');mb.setAttribute('aria-expanded','true');mb.textContent=mb.getAttribute('data-open');}
      else{box.setAttribute('hidden','');mb.setAttribute('aria-expanded','false');mb.textContent=mb.getAttribute('data-closed');}
    }
    haptic(8);return;
  }
  if(e.target.closest('[data-haptic]'))haptic(12);
});
el.search.addEventListener('input',()=>{STATE.q=el.search.value;el.clear.classList.toggle('show',!!el.search.value);render();});
el.clear.addEventListener('click',()=>{el.search.value='';STATE.q='';el.clear.classList.remove('show');render();el.search.focus();});
boot();
</script>
</body>
</html>
