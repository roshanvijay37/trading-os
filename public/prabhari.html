<style>
:root{
  --saffron:#FF6A00;
  --saffron-deep:#E85D04;
  --green:#138808;
  --green-deep:#0B6E04;
  --ink:#181410;
  --ink-soft:#6b635a;
  --paper:#FBF8F4;
  --card:#FFFFFF;
  --line:#EFE7DD;
  --ring:rgba(255,106,0,.28);
  --shadow:0 1px 2px rgba(24,20,16,.04),0 4px 14px rgba(24,20,16,.06);
  --shadow-lg:0 8px 30px rgba(24,20,16,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.5;
  background-image:radial-gradient(circle at 12% -8%,rgba(255,106,0,.07),transparent 42%),radial-gradient(circle at 88% -4%,rgba(19,136,8,.06),transparent 40%);
  background-attachment:fixed;
}

/* ---------- Header ---------- */
.hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(251,248,244,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);
}
.hdr-bar{height:4px;background:linear-gradient(90deg,var(--saffron) 0%,var(--saffron) 33%,#fff 33%,#fff 66%,var(--green) 66%,var(--green) 100%)}
.hdr-in{max-width:760px;margin:0 auto;padding:12px max(16px,env(safe-area-inset-left)) 12px max(16px,env(safe-area-inset-right));display:flex;align-items:center;gap:12px}
.lotus{
  width:46px;height:46px;border-radius:13px;flex:0 0 auto;
  background:linear-gradient(150deg,var(--saffron),var(--saffron-deep));
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(232,93,4,.34);overflow:hidden;
}
.lotus img{width:34px;height:34px;object-fit:contain;filter:brightness(0) invert(1)}
.lotus .fallback{font-size:24px;line-height:1}
.hdr-txt{min-width:0;flex:1}
.hdr-txt h1{font-family:'Sora';font-size:16px;font-weight:800;letter-spacing:-.01em;line-height:1.15}
.hdr-txt .kn{font-size:11.5px;color:var(--saffron-deep);font-weight:600}
.hdr-txt .sub{font-size:11px;color:var(--ink-soft);margin-top:1px}
.badge{flex:0 0 auto;font-family:'Sora';font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--green-deep);background:rgba(19,136,8,.1);border:1px solid rgba(19,136,8,.2);padding:5px 9px;border-radius:999px}

/* back link */
.backbar{max-width:760px;margin:0 auto;padding:10px max(16px,env(safe-area-inset-left)) 0 max(16px,env(safe-area-inset-right))}
.back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--saffron-deep);text-decoration:none;font-family:'Sora';min-height:40px;padding:4px 2px;margin:-4px -2px;touch-action:manipulation}
.back svg{width:15px;height:15px}
.back:active{opacity:.6}

/* ---------- Controls ---------- */
.wrap{max-width:760px;margin:0 auto;padding:8px max(16px,env(safe-area-inset-left)) 0 max(16px,env(safe-area-inset-right))}
.stats{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--ink-soft);font-weight:500;margin:8px 0 12px}
.stats b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.stats .sep{width:4px;height:4px;border-radius:50%;background:var(--line)}
.search{position:relative;margin-bottom:12px}
.search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-soft);pointer-events:none}
.search input{
  width:100%;height:50px;padding:0 44px 0 44px;font-size:16px;font-family:inherit;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search input:focus{border-color:var(--saffron);box-shadow:0 0 0 4px var(--ring)}
.search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:transparent;color:var(--ink-soft);font-size:20px;cursor:pointer;border-radius:8px;display:none;align-items:center;justify-content:center}
.search .clear.show{display:flex}

.count{font-size:12.5px;color:var(--ink-soft);padding:0 2px 10px;font-weight:500}
.count b{color:var(--ink);font-weight:700}

/* ---------- Card ---------- */
.cards{display:flex;flex-direction:column;gap:9px;padding-bottom:8px}
.card{
  display:flex;align-items:flex-start;gap:13px;padding:13px;background:var(--card);
  border:1px solid var(--line);border-radius:17px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;
}
.card:active{transform:scale(.992)}
.avatar{
  width:46px;height:46px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-family:'Sora';font-weight:700;font-size:17px;color:#fff;margin-top:1px;
}
.meta{flex:1;min-width:0}
.meta .nm{font-weight:600;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .sk{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--ink-soft);margin-top:2px;font-weight:500}
.meta .sk svg{width:12px;height:12px;flex:0 0 auto;color:var(--saffron-deep);opacity:.85}
.meta .sk span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role{display:inline-block;margin-top:7px;font-family:'Sora';font-size:10.5px;font-weight:600;letter-spacing:.01em;color:var(--green-deep);background:rgba(19,136,8,.09);border:1px solid rgba(19,136,8,.18);padding:3px 9px;border-radius:999px;line-height:1.45}
.meta .ph{
  display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;
  margin-top:8px;letter-spacing:.02em;font-family:inherit;background:none;border:none;padding:8px 6px;margin-left:-6px;cursor:pointer;min-height:36px;
}
.meta .ph .cp{width:13px;height:13px;opacity:0;transform:scale(.8);transition:opacity .15s,transform .15s;color:var(--saffron-deep)}
.meta .ph:active .cp,.card:hover .ph .cp{opacity:.7;transform:scale(1)}
.meta .ph.nophone{cursor:default}
.acts{display:flex;flex-direction:column;gap:9px;flex:0 0 auto;margin-top:1px}
.fab{
  width:44px;height:44px;border-radius:13px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;transition:transform .12s,filter .12s;font-family:inherit;padding:0;text-decoration:none;
}
.fab:active{transform:scale(.9)}
.fab svg{width:20px;height:20px}
.fab.call{background:linear-gradient(150deg,#1aa608,var(--green-deep));box-shadow:0 4px 11px rgba(11,110,4,.32)}
.fab.wa{background:linear-gradient(150deg,#25D366,#128C7E);box-shadow:0 4px 11px rgba(18,140,127,.3)}
.fab[disabled],.fab[aria-disabled="true"]{background:#d9d2c8;box-shadow:none;cursor:not-allowed;pointer-events:none}

/* entrance */
.cards.anim .card{animation:cardIn .42s cubic-bezier(.22,.61,.36,1) both}
.cards.anim .card:nth-child(1){animation-delay:.02s}
.cards.anim .card:nth-child(2){animation-delay:.05s}
.cards.anim .card:nth-child(3){animation-delay:.08s}
.cards.anim .card:nth-child(4){animation-delay:.11s}
.cards.anim .card:nth-child(5){animation-delay:.14s}
.cards.anim .card:nth-child(6){animation-delay:.17s}
.cards.anim .card:nth-child(7){animation-delay:.20s}
.cards.anim .card:nth-child(8){animation-delay:.23s}
.cards.anim .card:nth-child(n+9){animation-delay:.26s}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty .ico{font-size:40px;margin-bottom:10px}
.empty h3{font-family:'Sora';font-size:16px;color:var(--ink);margin-bottom:5px;font-weight:700}
.empty p{font-size:13.5px}

/* toast */
.toast{
  position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));z-index:100;
  display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:13px;
  background:var(--ink);color:#fff;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);
  opacity:0;transform:translate(-50%,14px);pointer-events:none;transition:opacity .22s,transform .22s;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast svg{width:16px;height:16px;color:#25D366}

/* scroll to top */
.totop{
  position:fixed;right:max(16px,env(safe-area-inset-right));bottom:calc(80px + env(safe-area-inset-bottom));z-index:60;
  width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.9);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:var(--saffron-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-lg);
  opacity:0;pointer-events:none;transform:translateY(8px) scale(.92);transition:opacity .2s,transform .2s;
}
.totop.show{opacity:1;pointer-events:auto;transform:none}
.totop svg{width:22px;height:22px}

.foot{max-width:760px;margin:8px auto 0;padding:28px 16px calc(40px + env(safe-area-inset-bottom));text-align:center}
.foot .div{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin-bottom:22px}
.foot .lotus-sm{width:40px;height:40px;border-radius:11px;margin:0 auto 12px;background:linear-gradient(150deg,var(--saffron),var(--saffron-deep));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(232,93,4,.3);overflow:hidden}
.foot .lotus-sm img{width:28px;height:28px;object-fit:contain;filter:brightness(0) invert(1)}
.foot .lotus-sm .fallback{font-size:20px}
.foot .love{font-size:14px;font-weight:500;color:var(--ink)}
.foot .love .heart{color:#E0245E}
.foot .by{font-family:'Sora';font-weight:800;font-size:15px;background:linear-gradient(90deg,var(--saffron-deep),var(--green-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-top:2px}
.foot .org{font-size:11.5px;color:var(--ink-soft);margin-top:10px}

@media (min-width:640px){
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

const WA_GREETING='ನಮಸ್ಕಾರ 🙏';

const SVG_WA='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.82 9.82 0 0 0 1.523 5.26l-.999 3.648 3.736-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>';
const SVG_COPY='<svg class="cp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
const SVG_PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>';
const SVG_TICK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>';

const listEl=document.getElementById('list');
const searchEl=document.getElementById('search');
const clearEl=document.getElementById('clear');
const countEl=document.getElementById('count');
const statsEl=document.getElementById('stats');
const toastEl=document.getElementById('toast');
const totopEl=document.getElementById('totop');

const KENDRAS=[...new Set(DATA.map(d=>d.sk))];
statsEl.innerHTML='<b>'+DATA.length+'</b> Prabharis<span class="sep"></span><b>'+KENDRAS.length+'</b> Shakti Kendras';

function cardHTML(r){
  const d=digits(r.phone);
  const ok=d.length===10;
  const tel='+91'+d;
  const [c1,c2]=palette(r.name);
  const nm=esc(r.name);
  const call=ok
    ?'<a class="fab call" href="tel:'+tel+'" data-haptic aria-label="Call '+nm+'" title="Call '+nm+'">'+SVG_CALL+'</a>'
    :'<span class="fab call" aria-disabled="true" title="No number on file">'+SVG_CALL+'</span>';
  const wa=ok
    ?'<a class="fab wa" href="https://wa.me/91'+d+'?text='+encodeURIComponent(WA_GREETING)+'" target="_blank" rel="noopener" data-haptic aria-label="WhatsApp '+nm+'" title="WhatsApp '+nm+'">'+SVG_WA+'</a>'
    :'<span class="fab wa" aria-disabled="true" title="No number on file">'+SVG_WA+'</span>';
  const phone=ok
    ?'<button type="button" class="ph" data-copy="'+esc(r.phone)+'" aria-label="Copy '+esc(r.phone)+'">'+esc(r.phone)+SVG_COPY+'</button>'
    :'<span class="ph nophone">No number on file</span>';
  return '<div class="card">'+
    '<div class="avatar" style="background:linear-gradient(150deg,'+c1+','+c2+')">'+initials(r.name)+'</div>'+
    '<div class="meta">'+
      '<div class="nm">'+nm+'</div>'+
      '<div class="sk">'+SVG_PIN+'<span>'+esc(r.sk)+'</span></div>'+
      '<span class="role">'+esc(r.role)+'</span>'+
      '<div>'+phone+'</div>'+
    '</div>'+
    '<div class="acts">'+call+wa+'</div></div>';
}

function render(animate){
  const q=searchEl.value.trim().toLowerCase();
  clearEl.classList.toggle('show',!!searchEl.value);
  let rows=DATA.filter(d=>{
    if(!q) return true;
    return d.name.toLowerCase().includes(q)||d.sk.toLowerCase().includes(q)||d.role.toLowerCase().includes(q)||d.phone.includes(q);
  });

  countEl.innerHTML='<b>'+rows.length+'</b> '+(rows.length===1?'Prabhari':'Prabharis');

  if(!rows.length){
    listEl.innerHTML='<div class="empty"><div class="ico">🔍</div><h3>No Prabharis found</h3><p>Try a different name, kendra, role or phone number.</p></div>';
    return;
  }
  const cls=animate?'cards anim':'cards';
  listEl.innerHTML='<div class="'+cls+'">'+rows.map(cardHTML).join('')+'</div>';
}

let toastTimer=null;
function showToast(msg){
  toastEl.innerHTML=SVG_TICK+'<span>'+esc(msg)+'</span>';
  toastEl.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1900);
}
async function copyText(t){
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(t);}
    else{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
    return true;
  }catch(e){return false;}
}

listEl.addEventListener('click',e=>{
  const cp=e.target.closest('[data-copy]');
  if(cp){
    const num=cp.getAttribute('data-copy');
    copyText(num).then(ok=>{haptic(ok?12:0);if(ok)showToast('Number copied · '+num);});
    return;
  }
  const fab=e.target.closest('[data-haptic]');
  if(fab)haptic(12);
});

searchEl.addEventListener('input',()=>render(false));
clearEl.addEventListener('click',()=>{searchEl.value='';searchEl.focus();render(false);});
window.addEventListener('scroll',()=>{totopEl.classList.toggle('show',window.scrollY>520);},{passive:true});
totopEl.addEventListener('click',()=>{haptic(8);window.scrollTo({top:0,behavior:'smooth'});});

render(true);
</script>
</body>
</html>
