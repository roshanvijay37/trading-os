<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#FF6A00">
<title>Booth Contacts · Mulki–Moodbidri Mandal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --saffron:#FF6A00;
  --saffron-deep:#E85D04;
  --green:#138808;
  --green-deep:#0B6E04;
  --ink:#181410;
  --ink-soft:#6b635a;
  --paper:#FBF8F4;
  --card:#FFFFFF;
  --line:#EFE7DD;
  --ring:rgba(255,106,0,.28);
  --shadow:0 1px 2px rgba(24,20,16,.04),0 4px 14px rgba(24,20,16,.06);
  --shadow-lg:0 8px 30px rgba(24,20,16,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.5;
  background-image:radial-gradient(circle at 12% -8%,rgba(255,106,0,.07),transparent 42%),radial-gradient(circle at 88% -4%,rgba(19,136,8,.06),transparent 40%);
  background-attachment:fixed;
}

/* ---------- Header ---------- */
.hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(251,248,244,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.hdr-bar{height:4px;background:linear-gradient(90deg,var(--saffron) 0%,var(--saffron) 33%,#fff 33%,#fff 66%,var(--green) 66%,var(--green) 100%)}
.hdr-in{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
